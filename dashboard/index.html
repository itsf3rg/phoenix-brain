<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigBoss Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-animation"></div>

    <header class="glass-panel">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">GB</div>
                <h1>GigBoss <span>Dispatch AI</span></h1>
            </div>
            <div class="status-indicator">
                <span class="pulse disconnected" id="connection-pulse"></span>
                <span id="connection-status">Disconnected</span>
            </div>
        </div>
    </header>

    <main class="dispatch-center">
        <div class="feed-container" id="offer-feed">
            <div class="empty-state" id="empty-state">
                <div class="radar-ping"></div>
                <p>Monitoring Uber & Lyft frequencies...</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
